<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
     role="img" aria-label="EUDI Wallet Certification Scheme — making the wallet-held decision layer evaluable">
  <title>EUDI Wallet Certification Scheme</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0f2741"/>
      <stop offset="100%" stop-color="#1a3d63"/>
    </linearGradient>
    <linearGradient id="plateBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7fc6ff" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#3a78b9" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="plateAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe49a" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#e0a341" stop-opacity="0.78"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title block (left) -->
  <text x="80" y="240" font-size="64" font-weight="700" fill="#ffffff">EUDI Wallet</text>
  <text x="80" y="312" font-size="64" font-weight="700" fill="#ffffff">Certification Scheme</text>
  <text x="80" y="362" font-size="26" font-weight="400" fill="#a8c8e6">Making the wallet-held decision layer evaluable</text>
  <text x="80" y="400" font-size="18" font-style="italic" fill="#7fa3c4">ENISA public review · April 2026 · CEN/TS 18297</text>

  <!-- Annotation pointing to top plate -->
  <text x="970" y="200" text-anchor="middle" font-size="14" font-style="italic" fill="#ffd97a" font-weight="500">proposed reference</text>
  <path d="M 970 208 Q 970 215 970 218" stroke="#ffd97a" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>

  <!-- Visual stack (right): 4 plates, top one amber/dashed -->
  <rect x="820" y="222" width="300" height="62" rx="8"
        fill="url(#plateAmber)" stroke="#ffd97a" stroke-width="2.5" stroke-dasharray="10 5"
        filter="url(#dropShadow)"/>
  <text x="970" y="261" text-anchor="middle" font-size="22" font-weight="700" fill="#3d2a00">Decision Layer</text>

  <rect x="820" y="300" width="300" height="55" rx="8"
        fill="url(#plateBlue)" stroke="#7fc6ff" stroke-opacity="0.45" stroke-width="1.5"
        filter="url(#dropShadow)"/>
  <text x="970" y="335" text-anchor="middle" font-size="20" font-weight="600" fill="#ffffff">PID On-boarding</text>

  <rect x="820" y="370" width="300" height="55" rx="8"
        fill="url(#plateBlue)" stroke="#7fc6ff" stroke-opacity="0.45" stroke-width="1.5"
        filter="url(#dropShadow)"/>
  <text x="970" y="405" text-anchor="middle" font-size="20" font-weight="600" fill="#ffffff">Instance Hardening</text>

  <rect x="820" y="440" width="300" height="55" rx="8"
        fill="url(#plateBlue)" stroke="#7fc6ff" stroke-opacity="0.45" stroke-width="1.5"
        filter="url(#dropShadow)"/>
  <text x="970" y="475" text-anchor="middle" font-size="20" font-weight="600" fill="#ffffff">Cryptographic Protection</text>

  <!-- linaltec mark -->
  <text x="1140" y="600" text-anchor="end" font-size="14" font-style="italic" fill="#7fa3c4">linaltec.com</text>
</svg>
